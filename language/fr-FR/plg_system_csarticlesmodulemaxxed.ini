PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Ignorer les N premiers articles"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Ignorer ce nombre d'articles au début du résultat et afficher le lot suivant à la place. Mettre 0 pour désactiver. Exemple : une page de blog affiche déjà les 5 articles les plus récents en haut ; définissez le nombre de ce module à 5 et l'ignorance à 5 pour afficher les articles 6-10 en dessous."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Envoyer un e-mail aux Super-Utilisateurs lors d'une mise à jour de Joomla"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="Lorsque Joomla lui-même est mis à jour, envoyer un e-mail unique à chaque Super-Utilisateur actif lui rappelant de vérifier que ce plugin fonctionne toujours sur la nouvelle version de Joomla. Par défaut : Oui."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_LABEL="E-mail de support"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_DESC="Adresse e-mail affichée lorsque l'extension présente un message « contactez le support ». Par défaut : support Cybersalt."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_LABEL="URL de support"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Adresse Web (par ex. un formulaire de contact ou une base de connaissances) affichée à côté de l'e-mail de support. Par défaut : https://cybersalt.com."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_LABEL="Libellé du support"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_DESC="Comment désigner le support dans les messages, par ex. « support Cybersalt », « notre équipe de support », « votre revendeur »."

