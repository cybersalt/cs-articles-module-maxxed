PLG_SYSTEM_CSARTICLESMODULEMAXXED="Cybersalt - Système - Articles Module Maxxed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Ajoute un paramètre « Ignorer les N premiers articles » aux modules d'articles du cœur de Joomla afin qu'ils commencent à afficher après un décalage choisi. Utile pour les mises en page « blog-teaser » où les premiers articles sont déjà affichés ailleurs sur la page."

