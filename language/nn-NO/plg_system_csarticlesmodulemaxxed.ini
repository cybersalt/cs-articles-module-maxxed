PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_PLUGIN_NOTE="Pluginen Cybersalt Articles Module Maxxed (versjon %s) vart opphavleg testa mot Joomla-versjonen du køyrde før denne oppgraderinga. Pluginen brukar stabile Joomla-APIar, men kvar Joomla-oppdatering kan endra åtferda - særleg visinga av standard artikkelmodulane."
