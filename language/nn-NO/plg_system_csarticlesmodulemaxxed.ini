PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Legg til ei innstilling «Hopp over dei første N artiklane» til Joomla sine standard artikkelmodular slik at dei byrjar å visa frå ei vald forskyving. Nyttig for blogg-teaser-oppsett der dei første artiklane alt vert viste ein annan stad på sida."

