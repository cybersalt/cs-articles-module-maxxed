PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Hopp over dei første N artiklane"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Hopp over så mange artiklar frå starten av resultatet og vis neste sett i staden. Set til 0 for å deaktivera. Døme: ei bloggside viser alt dei 5 nyaste artiklane øvst; set denne modulens tal til 5 og hopp over til 5 for å visa artiklane 6-10 under."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Send e-post til Super Users når Joomla vert oppdatert"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="Når Joomla sjølv vert oppgradert, send ein eingongs e-post til kvar aktive Super User som minner dei på å stadfesta at denne pluginen framleis fungerer på den nye Joomla-versjonen. Standard: Ja."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_LABEL="Støtte-e-post"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_DESC="E-postadressa som vert vist når utvidinga viser ei «kontakt support»-melding. Standard: Cybersalt-støtte."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_LABEL="Støtte-URL"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Nettadresse (t.d. eit kontaktskjema eller ei kunnskapsbase) som vert vist ved sida av støtte-e-posten. Standard: https://cybersalt.com."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_LABEL="Støttemerkelapp"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_DESC="Korleis visa til støtte i meldingar, t.d. «Cybersalt-støtte», «vårt støtteteam», «din forhandlar»."

