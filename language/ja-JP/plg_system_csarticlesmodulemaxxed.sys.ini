PLG_SYSTEM_CSARTICLESMODULEMAXXED="Cybersalt - System - Articles Module Maxxed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Adds a 'Skip first N articles' setting to Joomla's core articles modules so they can start displaying after a chosen offset."

; Field labels — duplicated from the .ini so they render correctly on the
; module edit form (only .sys.ini auto-loads outside the plugin's own settings).
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Skip first N articles"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Skip this many articles from the start of the result and display the next batch instead. Set to 0 to disable. Example: a blog page already shows the 5 most recent articles up top, so set this module's count to 5 and skip to 5 to show articles 6-10 below."

; Postflight install card strings (must be in .sys.ini because .ini is not
; loaded during installer execution).
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_TITLE_INSTALL="Cybersalt Articles Module Maxxed installed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_TITLE_UPDATE="Cybersalt Articles Module Maxxed updated"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_INTRO="Adds a 'Skip first N articles' setting to Joomla 6's mod_articles module, plus the legacy mod_articles_category and mod_articles_latest."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_STEPS_HEADING="What to do next"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_STEP_1="Confirm the plugin is enabled (it auto-enables on first install)."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_STEP_2="Optionally narrow which module types expose the new field by visiting the plugin's 'Apply to modules' setting."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_STEP_3="Open any Articles module and look for the 'Skip first N articles' field next to 'Number of Articles'."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_LINK_PLUGIN="Open plugin settings"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_INSTALL_CARD_LINK_MODULES="Open modules manager"
