PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Παραλείψτε τόσα άρθρα από την αρχή του αποτελέσματος και εμφανίστε την επόμενη παρτίδα. Ορίστε σε 0 για απενεργοποίηση. Παράδειγμα: μια σελίδα ιστολογίου ήδη εμφανίζει τα 5 πιο πρόσφατα άρθρα στην κορυφή· ορίστε τον αριθμό αυτής της μονάδας σε 5 και την παράλειψη σε 5 για να εμφανίσετε τα άρθρα 6-10 παρακάτω."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Αποστολή email στους Super Users όταν ενημερώνεται το Joomla"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="Όταν το ίδιο το Joomla αναβαθμίζεται, αποστείλετε ένα μοναδικό email σε κάθε ενεργό Super User υπενθυμίζοντάς του να επαληθεύσει ότι αυτό το πρόσθετο εξακολουθεί να λειτουργεί στη νέα έκδοση Joomla. Προεπιλογή: Ναι."

