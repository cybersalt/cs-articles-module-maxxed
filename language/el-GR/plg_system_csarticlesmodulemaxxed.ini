PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_PLUGIN_NOTE="Το πρόσθετο Cybersalt Articles Module Maxxed (έκδοση %s) δοκιμάστηκε αρχικά στην έκδοση Joomla που χρησιμοποιούσατε πριν από αυτήν την αναβάθμιση. Το πρόσθετο χρησιμοποιεί σταθερά API του Joomla, αλλά κάθε ενημέρωση Joomla μπορεί να αλλάξει τη συμπεριφορά - ειδικά την απόδοση των βασικών μονάδων άρθρων."
