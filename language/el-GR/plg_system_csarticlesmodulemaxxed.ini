PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_2="Επιβεβαιώστε ότι το frontend συνεχίζει να παραλείπει τον ρυθμισμένο αριθμό άρθρων."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_3="Εάν το πεδίο Παράλειψη λείπει από τη φόρμα μονάδας ή τα άρθρα δεν παραλείπονται πλέον, το πρόσθετο μπορεί να χρειάζεται ενημέρωση."
