PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Hopp over de første N artiklene"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Hopp over så mange artikler fra starten av resultatet og vis neste sett i stedet. Sett til 0 for å deaktivere. Eksempel: en bloggside viser allerede de 5 nyeste artiklene øverst; sett denne modulens antall til 5 og hopp over til 5 for å vise artiklene 6-10 nedenfor."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Send e-post til Super Users når Joomla oppdateres"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="Når Joomla selv oppgraderes, send en engangs e-post til hver aktive Super User som minner dem på å bekrefte at denne pluginen fortsatt fungerer på den nye Joomla-versjonen. Standard: Ja."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_LABEL="Støtte-e-post"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_DESC="E-postadressen som vises når utvidelsen viser en «kontakt support»-melding. Standard: Cybersalt-støtte."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_LABEL="Støtte-URL"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Nettadresse (f.eks. et kontaktskjema eller en kunnskapsbase) som vises ved siden av støtte-e-posten. Standard: https://cybersalt.com."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_LABEL="Støtteetikett"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_DESC="Hvordan henvise til støtte i meldinger, f.eks. «Cybersalt-støtte», «vårt støtteteam», «din forhandler»."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_SUBJECT="Joomla oppdatert til %1$s på %2$s - vennligst bekreft at Cybersalt Articles Module Maxxed fortsatt fungerer"
