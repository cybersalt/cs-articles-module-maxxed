PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_TARGETS_DESC="Hvilke standard artikkelmoduler skal vise innstillingen «Hopp over de første N artiklene»."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_TARGET_MOD_ARTICLES="Artikler (mod_articles) - den forente Joomla 6-modulen"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_TARGET_MOD_ARTICLES_CATEGORY="Artikler - Kategori (mod_articles_category) - eldre"
