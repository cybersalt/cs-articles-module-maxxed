PLG_SYSTEM_CSARTICLESMODULEMAXXED="Cybersalt - System - Articles Module Maxxed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Legger til en innstilling «Hopp over de første N artiklene» i Joomlas standard artikkelmoduler slik at de begynner å vise fra en valgt forskyvning. Nyttig for blogg-teaser-oppsett der de første artiklene allerede vises et annet sted på siden."

