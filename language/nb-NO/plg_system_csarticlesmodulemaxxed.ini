PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_INTRO="Merk: Joomla på nettstedet ditt %1$s (%2$s) ble oppgradert fra versjon %3$s til versjon %4$s."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_PLUGIN_NOTE="Pluginen Cybersalt Articles Module Maxxed (versjon %s) ble opprinnelig testet mot Joomla-versjonen du kjørte før denne oppgraderingen. Pluginen bruker stabile Joomla-APIer, men hver Joomla-oppdatering kan endre oppførselen - spesielt visningen av standard artikkelmodulene."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_HEADING="Hva du skal sjekke"
