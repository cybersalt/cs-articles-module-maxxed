PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_TARGETS_DESC="Welche Standard-Artikelmodule die Einstellung 'Erste N Beiträge überspringen' anbieten sollen."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_TARGET_MOD_ARTICLES="Beiträge (mod_articles) - das vereinheitlichte Joomla-6-Modul"
