PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Erste N Beiträge überspringen"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Diese Anzahl Beiträge am Anfang überspringen und stattdessen die nächste Auswahl anzeigen. Auf 0 setzen, um zu deaktivieren. Beispiel: Eine Blog-Seite zeigt bereits die 5 neuesten Beiträge oben; setzen Sie die Anzahl dieses Moduls auf 5 und 'Überspringen' auf 5, um die Beiträge 6-10 darunter anzuzeigen."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Super User per E-Mail benachrichtigen, wenn Joomla aktualisiert wird"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="Wenn Joomla selbst aktualisiert wird, eine einmalige E-Mail an jeden aktiven Super User senden, mit der Bitte zu prüfen, ob dieses Plugin auf der neuen Joomla-Version weiter funktioniert. Standard: Ja."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_LABEL="Support-E-Mail"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_DESC="E-Mail-Adresse, die in 'Support kontaktieren'-Meldungen angezeigt wird. Standard: Cybersalt-Support."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_LABEL="Support-URL"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Webadresse (z. B. ein Kontaktformular oder eine Wissensdatenbank), die neben der Support-E-Mail erscheint. Standard: https://cybersalt.com."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_LABEL="Support-Bezeichnung"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_DESC="Wie in Meldungen auf den Support verwiesen werden soll, z. B. 'Cybersalt-Support', 'unser Support-Team', 'Ihr Reseller'."

