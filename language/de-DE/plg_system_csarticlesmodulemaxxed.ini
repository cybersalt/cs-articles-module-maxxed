PLG_SYSTEM_CSARTICLESMODULEMAXXED="Cybersalt - System - Articles Module Maxxed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Fügt den Joomla-Standard-Artikelmodulen die Einstellung 'Erste N Beiträge überspringen' hinzu, sodass sie ab einem gewählten Offset anzeigen. Praktisch für Blog-Teaser-Layouts, bei denen die ersten Beiträge bereits an anderer Stelle der Seite gezeigt werden."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELDSET_BASIC_LABEL="Allgemein"
