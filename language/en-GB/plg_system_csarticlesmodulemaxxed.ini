PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_DESC="Email address shown when the extension surfaces a 'contact support' message. Defaults to Cybersalt support."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_LABEL="Support URL"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Web address (e.g. a contact form or knowledge-base page) shown alongside the support email. Defaults to https://cybersalt.com."
