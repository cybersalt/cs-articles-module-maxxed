PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Skip first N articles"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Skip this many articles from the start of the result and display the next batch instead. Set to 0 to disable. Example: a blog page already shows the 5 most recent articles up top, so set this module's count to 5 and skip to 5 to show articles 6-10 below."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Email Super Users when Joomla is updated"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="When Joomla itself is upgraded, send a one-time email to every active Super User reminding them to verify this plugin still works on the new Joomla version. Default: Yes."

