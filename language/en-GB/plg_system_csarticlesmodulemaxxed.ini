; Email sent to Super Users when a Joomla version change is detected.
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_SUBJECT="Joomla updated to %1$s on %2$s - please verify Cybersalt Articles Module Maxxed still works"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_GREETING="Hi %s,"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_INTRO="Heads up: Joomla on your site at %1$s (%2$s) was upgraded from version %3$s to version %4$s."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_PLUGIN_NOTE="The Cybersalt Articles Module Maxxed plugin (version %s) was originally tested against the version of Joomla you were running before this upgrade. The plugin uses stable Joomla APIs, but every Joomla update can change behaviour - especially the rendering of the core articles modules."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_HEADING="What to check"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_1="Open any Articles module that uses the 'Skip first N articles' setting."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_2="Verify the front-end still skips the configured number of articles."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_CHECK_3="If the Skip field is missing from the module form, or articles are no longer being skipped, the plugin may need an update."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_BROKEN_HEADING="If something is broken"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_BROKEN_1="Check the GitHub releases page for a newer version of the plugin."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_BROKEN_2="Open an issue describing the problem on GitHub."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_BROKEN_3="Or contact %1$s: %2$s"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_NOTIFY_EMAIL_FOOTER="This is a one-time alert per Joomla version change; you won't receive another email until Joomla is updated again."
