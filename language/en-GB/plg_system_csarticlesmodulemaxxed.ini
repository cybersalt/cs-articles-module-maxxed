PLG_SYSTEM_CSARTICLESMODULEMAXXED="Cybersalt - System - Articles Module Maxxed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Adds a 'Skip first N articles' setting to Joomla's core articles modules so they can start displaying after a chosen offset. Useful for blog-tease layouts where the first few articles are already shown elsewhere on the page."

