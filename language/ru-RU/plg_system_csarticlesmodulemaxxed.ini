PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Веб-адрес (например, форма обратной связи или база знаний), отображаемый рядом с email поддержки. По умолчанию: https://cybersalt.com."
