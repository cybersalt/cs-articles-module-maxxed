PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Пропустить первые N материалов"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Пропустить указанное количество материалов с начала результата и показать следующую партию. Установите 0, чтобы отключить. Пример: страница блога уже показывает 5 последних материалов сверху; установите количество в этом модуле равным 5 и пропуск равным 5, чтобы показать материалы 6-10 ниже."

