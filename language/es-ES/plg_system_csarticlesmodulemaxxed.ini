PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_LABEL="Saltar los primeros N artículos"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SKIP_DESC="Salta esta cantidad de artículos al inicio del resultado y muestra el siguiente lote. Pon 0 para desactivar. Ejemplo: una página de blog ya muestra los 5 artículos más recientes arriba; pon en este módulo el conteo en 5 y el salto en 5 para mostrar los artículos 6-10 debajo."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_LABEL="Enviar correo a los Super Usuarios cuando Joomla se actualice"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_NOTIFY_DESC="Cuando Joomla mismo se actualice, enviar un correo único a cada Super Usuario activo recordándoles verificar que este plugin sigue funcionando en la nueva versión de Joomla. Por defecto: Sí."

PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_LABEL="Correo de soporte"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_EMAIL_DESC="Dirección de correo mostrada cuando la extensión muestre un mensaje 'contacta con soporte'. Por defecto: soporte de Cybersalt."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_LABEL="URL de soporte"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_URL_DESC="Dirección web (p. ej. un formulario de contacto o base de conocimiento) mostrada junto al correo de soporte. Por defecto: https://cybersalt.com."
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_LABEL="Etiqueta de soporte"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_FIELD_SUPPORT_LABEL_DESC="Cómo referirse a soporte en los mensajes, p. ej. 'soporte de Cybersalt', 'nuestro equipo de soporte', 'tu distribuidor'."

