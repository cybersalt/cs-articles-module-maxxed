PLG_SYSTEM_CSARTICLESMODULEMAXXED="Cybersalt - Sistema - Articles Module Maxxed"
PLG_SYSTEM_CSARTICLESMODULEMAXXED_XML_DESCRIPTION="Añade un ajuste 'Saltar los primeros N artículos' a los módulos de artículos del núcleo de Joomla para que comiencen a mostrarse a partir de un desplazamiento elegido. Útil para diseños de tipo blog-teaser donde los primeros artículos ya se muestran en otra parte de la página."

